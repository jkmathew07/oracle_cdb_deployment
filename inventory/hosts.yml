---
all:
  children:
    oracle_nodes:
      hosts:

        # ── Server 1 ────────────────────────────────────────────────────────
        netz-srv-20.criknetz.com:
          ansible_host: 192.10.10.20

          # Workflow
          workflow_id: 1

          # DB identity
          oracle_sid:  TESTCDB
          db_name:     TESTCDB
          oracle_home: /u01/app/oracle/product/26.2.0/db_home

          # Storage locations
          db_data_file_loc: /ora_data
          db_fra:           /ora_fra
          db_arch_loc:      /ora_arch
          db_redo_loc:      /ora_redo

          # Memory — SGA and PGA (MB)
          sga_target_mb: 6144
          pga_target_mb: 2048

          # PDBs — list one or more names
          pdb_names:
            - TESTPDB1
            - TESTPDB2

          # Listener
          listener_port: 1521

          # DB sizing
          character_set:    AL32UTF8
          memory_target_mb: 0        # must be 0 when using sga_target + pga_target

        # ── Server 2 (example: different DB on different server) ─────────────
        # kes-db-srv-2001.homelab.ai.com:
        #   ansible_host: 192.10.10.221
        #   workflow_id:  1
        #   oracle_sid:   PRODCDB
        #   db_name:      PRODCDB
        #   oracle_home:  /u01/app/oracle/product/19.0.0/dbhome_1
        #   db_data_file_loc: /u02/oradata
        #   db_fra:           /u03/fast_recovery_area
        #   db_arch_loc:      /u04/archivelog
        #   db_redo_loc:      /u05/redo
        #   sga_target_mb: 12288
        #   pga_target_mb: 4096
        #   pdb_names:
        #     - PRODPDB1
        #   listener_port: 1521
        #   character_set: AL32UTF8
        #   memory_target_mb: 0

  # ── Connection settings (shared across all hosts) ────────────────────────
  vars:
    ansible_user:                 ansible
    ansible_ssh_private_key_file: /home/runner/.ssh/id_ed25519
    ansible_become:               true
    ansible_become_method:        sudo
    ansible_ssh_common_args:      '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
