---
# =============================================================================
# deploy_database.yml
# Entry point — run from the project root:
#
#   cd /project/github/oracle_cdb_deployment
#   ansible-playbook deploy_database.yml \
#     --vault-password-file ~/.vault_pass
#
# ansible.cfg in this directory sets inventory and roles_path automatically.
# workflow_id is defined per-host in inventory/hosts.yml.
# =============================================================================

- name: "Oracle CDB Deployment"
  hosts: oracle_nodes
  gather_facts: true
  any_errors_fatal: true

  pre_tasks:
    - name: "pre | assert Ansible >= 2.14"
      ansible.builtin.assert:
        that: ansible_version.full is version('2.14', '>=')
        fail_msg: "Ansible >= 2.14 required. Found: {{ ansible_version.full }}"
        quiet: true
      tags: [always]

    - name: "pre | refresh date/time facts"
      ansible.builtin.setup:
        filter: ansible_date_time
      tags: [always]

  roles:
    - role: orchestrator
      tags: [always]
