---
# =============================================================================
# group_vars/all/workflow_map.yml
#
# Each workflow entry defines an ordered steps list.
# Naming convention drives dispatch:
#   gate_*  → orchestrator hands to gate_engine
#   phase_* → orchestrator hands to phase_engine
#
# Adding a new workflow = add an entry here. No playbook changes needed.
# =============================================================================

workflow_map:

  # ── Workflow 1: Full CDB deployment (standalone or Grid auto-detected) ──────
  - id: 1
    name: "Oracle CDB Deployment"
    description: >-
      Full silent-mode CDB creation. Detects Grid automatically.
      Configures listener, runs DBCA, validates result.
    steps:
      - gate_input_validation
      - gate_environment_validation
      - gate_network_validation
      - phase_db_creation
