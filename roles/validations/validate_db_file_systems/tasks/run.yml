---
# =============================================================================
# validations/validate_db_file_systems/tasks/run.yml
# Checks all four storage locations exist and are directories.
# Each path is stat-ed individually with a fixed register name —
# Ansible does not support templated register values.
# =============================================================================

- name: "validate_db_file_systems | run"
  block:

    # ── Stat each location with a fixed register name ─────────────────────────
    - name: "validate_db_file_systems | stat db_data_file_loc"
      ansible.builtin.stat:
        path: "{{ db_data_file_loc }}"
      register: _stat_data
      become: true

    - name: "validate_db_file_systems | stat db_fra"
      ansible.builtin.stat:
        path: "{{ db_fra }}"
      register: _stat_fra
      become: true

    - name: "validate_db_file_systems | stat db_arch_loc"
      ansible.builtin.stat:
        path: "{{ db_arch_loc }}"
      register: _stat_arch
      become: true

    - name: "validate_db_file_systems | stat db_redo_loc"
      ansible.builtin.stat:
        path: "{{ db_redo_loc }}"
      register: _stat_redo
      become: true

    # ── Collect failures so all missing paths are reported at once ────────────
    - name: "validate_db_file_systems | collect missing paths"
      ansible.builtin.set_fact:
        _fs_failures: >-
          {{
            ([] if (_stat_data.stat.exists and _stat_data.stat.isdir)
                else ['db_data_file_loc=' + db_data_file_loc + ' — does not exist or is not a directory'])
            +
            ([] if (_stat_fra.stat.exists and _stat_fra.stat.isdir)
                else ['db_fra=' + db_fra + ' — does not exist or is not a directory'])
            +
            ([] if (_stat_arch.stat.exists and _stat_arch.stat.isdir)
                else ['db_arch_loc=' + db_arch_loc + ' — does not exist or is not a directory'])
            +
            ([] if (_stat_redo.stat.exists and _stat_redo.stat.isdir)
                else ['db_redo_loc=' + db_redo_loc + ' — does not exist or is not a directory'])
          }}

    - name: "validate_db_file_systems | assert all storage locations exist"
      ansible.builtin.assert:
        that: _fs_failures | length == 0
        fail_msg: |
          One or more storage locations are missing:
          {% for f in _fs_failures %}
            ✗  {{ f }}
          {% endfor %}
          Create all mount points before running this playbook.
        quiet: true

    - name: "validate_db_file_systems | set PASSED"
      ansible.builtin.set_fact:
        _val_status:
          name:    "validate_db_file_systems"
          status:  "PASSED"
          message: >-
            All storage locations verified —
            data={{ db_data_file_loc }},
            fra={{ db_fra }},
            arch={{ db_arch_loc }},
            redo={{ db_redo_loc }}.

  rescue:

    - name: "validate_db_file_systems | set FAILED"
      ansible.builtin.set_fact:
        _val_status:
          name:    "validate_db_file_systems"
          status:  "FAILED"
          message: "{{ ansible_failed_result.msg | default('Filesystem check failed') | truncate(200) }}"
