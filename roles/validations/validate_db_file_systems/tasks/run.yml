---
# =============================================================================
# validations/validate_db_file_systems/tasks/run.yml
# Checks all four storage locations exist and are directories.
# Locations checked:
#   db_data_file_loc  — datafiles
#   db_fra            — Fast Recovery Area
#   db_arch_loc       — archivelog destination
#   db_redo_loc       — redo log location
# =============================================================================

- name: "validate_db_file_systems | run"
  block:

    # ── Build a list of all paths to check ────────────────────────────────────
    - name: "validate_db_file_systems | build storage path list"
      ansible.builtin.set_fact:
        _storage_paths:
          - label: "db_data_file_loc"
            path:  "{{ db_data_file_loc }}"
          - label: "db_fra"
            path:  "{{ db_fra }}"
          - label: "db_arch_loc"
            path:  "{{ db_arch_loc }}"
          - label: "db_redo_loc"
            path:  "{{ db_redo_loc }}"

    # ── Stat every path ───────────────────────────────────────────────────────
    - name: "validate_db_file_systems | stat {{ _sp.label }}: {{ _sp.path }}"
      ansible.builtin.stat:
        path: "{{ _sp.path }}"
      register: "_fs_stat_{{ _sp.label }}"
      become: true
      loop:         "{{ _storage_paths }}"
      loop_control:
        loop_var: _sp
        label:    "{{ _sp.label }}"

    # ── Assert db_data_file_loc ───────────────────────────────────────────────
    - name: "validate_db_file_systems | assert db_data_file_loc exists"
      ansible.builtin.assert:
        that:
          - _fs_stat_db_data_file_loc.stat.exists
          - _fs_stat_db_data_file_loc.stat.isdir
        fail_msg: >-
          db_data_file_loc={{ db_data_file_loc }} does not exist or is not a
          directory. Create the mount point before running this playbook.
        quiet: true

    # ── Assert db_fra ─────────────────────────────────────────────────────────
    - name: "validate_db_file_systems | assert db_fra exists"
      ansible.builtin.assert:
        that:
          - _fs_stat_db_fra.stat.exists
          - _fs_stat_db_fra.stat.isdir
        fail_msg: >-
          db_fra={{ db_fra }} does not exist or is not a directory.
          Create the mount point before running this playbook.
        quiet: true

    # ── Assert db_arch_loc ────────────────────────────────────────────────────
    - name: "validate_db_file_systems | assert db_arch_loc exists"
      ansible.builtin.assert:
        that:
          - _fs_stat_db_arch_loc.stat.exists
          - _fs_stat_db_arch_loc.stat.isdir
        fail_msg: >-
          db_arch_loc={{ db_arch_loc }} does not exist or is not a directory.
          Create the mount point before running this playbook.
        quiet: true

    # ── Assert db_redo_loc ────────────────────────────────────────────────────
    - name: "validate_db_file_systems | assert db_redo_loc exists"
      ansible.builtin.assert:
        that:
          - _fs_stat_db_redo_loc.stat.exists
          - _fs_stat_db_redo_loc.stat.isdir
        fail_msg: >-
          db_redo_loc={{ db_redo_loc }} does not exist or is not a directory.
          Create the mount point before running this playbook.
        quiet: true

    - name: "validate_db_file_systems | set PASSED"
      ansible.builtin.set_fact:
        _val_status:
          name:    "validate_db_file_systems"
          status:  "PASSED"
          message: >-
            All storage locations verified:
            data={{ db_data_file_loc }},
            fra={{ db_fra }},
            arch={{ db_arch_loc }},
            redo={{ db_redo_loc }}.

  rescue:

    - name: "validate_db_file_systems | set FAILED"
      ansible.builtin.set_fact:
        _val_status:
          name:    "validate_db_file_systems"
          status:  "FAILED"
          message: "{{ ansible_failed_result.msg | default('Filesystem check failed') | truncate(200) }}"
