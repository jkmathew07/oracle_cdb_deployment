---
# =============================================================================
# validations/validate_grid_listener/tasks/main.yml
# VALIDATION TEMPLATE — identical structure across all validation roles.
#
# Pattern:  Initialize → Invoke (run.yml) → Update Dashboard
#
# CONTRACT — run.yml must set these facts before returning:
#   _val_status  : "PASSED" | "FAILED" | "SKIPPED"
#   _val_message : human-readable outcome
# =============================================================================

# ── 1. INITIALIZE ─────────────────────────────────────────────────────────────
- name: "validate grid listener | INITIALIZE"
  ansible.builtin.set_fact:
    _val_status:     "RUNNING"
    _val_message:    ""
    _val_started_at: "{{ ansible_date_time.iso8601 }}"
  tags: [validation, always]

- name: "validate grid listener | log start"
  ansible.builtin.lineinfile:
    path:   "{{ log_file }}"
    line: >-
      {{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} |
      validate_grid_listener | INFO | validation_start | Validate Grid Listener
    create: true
    mode:   '0640'
  become: true
  ignore_errors: true
  tags: [validation, logging]

- name: "validate grid listener | display start"
  ansible.builtin.debug:
    msg: "[ VALIDATION ] Validate Grid Listener — starting"
  tags: [validation]

# ── 2. INVOKE ─────────────────────────────────────────────────────────────────
- name: "validate grid listener | INVOKE run.yml"
  ansible.builtin.include_tasks: run.yml
  tags: [validation]

# ── 3. UPDATE DASHBOARD ───────────────────────────────────────────────────────
- name: "validate grid listener | UPDATE DASHBOARD"
  ansible.builtin.include_role:
    name: dashboard
    tasks_from: update_validation.yml
  tags: [validation, dashboard]

- name: "validate grid listener | log result"
  ansible.builtin.lineinfile:
    path: "{{ log_file }}"
    line: >-
      {{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} |
      validate_grid_listener |
      {{ 'INFO' if _val_status in ['PASSED','SKIPPED'] else 'ERROR' }} |
      validation_result | Validate Grid Listener: {{ _val_status }} — {{ _val_message | truncate(150) }}
    create: true
    mode:   '0640'
  become: true
  ignore_errors: true
  tags: [validation, logging]

- name: "validate grid listener | display result"
  ansible.builtin.debug:
    msg: "[ VALIDATION ] Validate Grid Listener: {{ _val_status }} — {{ _val_message }}"
  tags: [validation]

